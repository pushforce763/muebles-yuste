name: Actualizar fotos.json

on:
  push:
    paths:
      - 'fotos/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  manifest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generar manifest
        run: |
          python3 - <<'EOF'
          import json, os, re

          BASE = 'fotos'
          EXTS = {'.jpg', '.jpeg', '.png', '.webp', '.avif', '.gif'}

          def natural_key(s):
              # "2.jpg" < "10.jpg" (natural sort)
              return [int(t) if t.isdigit() else t.lower()
                      for t in re.split(r'(\d+)', s)]

          manifest = {}
          for d in sorted(os.listdir(BASE)):
              path = os.path.join(BASE, d)
              if os.path.isdir(path):
                  files = [f for f in os.listdir(path)
                           if os.path.splitext(f.lower())[1] in EXTS]
                  manifest[d] = sorted(files, key=natural_key)

          with open('fotos.json', 'w', encoding='utf-8') as fh:
              json.dump(manifest, fh, ensure_ascii=False, indent=2)
          EOF

      - name: Commit si hay cambios
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add fotos.json
          git diff --cached --quiet || git commit -m "chore: actualizar fotos.json"
          git push
