<style>
:root{
  --nogal:#241b13;        /* walnut — dark sections */
  --nogal-soft:#3a2e21;
  --paper:#f4f1e9;        /* linen background */
  --card:#fbf9f4;
  --brass:#a87b2d;        /* brass hardware accent */
  --brass-light:#c99a45;
  --sage:#59684f;         /* upholstery green */
  --ink:#2b241d;
  --muted:#7a6f60;
  --line:#e0dacc;
  --radius:10px;
  --display:'Libre Caslon Text',Georgia,serif;
  --body:'Karla',system-ui,sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:var(--body);background:var(--paper);color:var(--ink);line-height:1.6;font-size:16.5px}
img{max-width:100%;height:auto;display:block}
a{color:inherit}
h1,h2,h3{font-family:var(--display);font-weight:700;line-height:1.15}
.container{max-width:1120px;margin:0 auto;padding:0 24px}
.eyebrow{font-family:var(--body);font-size:.78rem;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:var(--brass)}
.section{padding:88px 0}
.section-head{max-width:640px;margin-bottom:48px}
.section-head h2{font-size:clamp(1.7rem,3.5vw,2.4rem);margin:.4em 0 .5em}
.section-head p{color:var(--muted)}

/* ---------- header ---------- */
header{position:sticky;top:0;z-index:50;background:rgba(244,241,233,.92);backdrop-filter:blur(8px);border-bottom:1px solid var(--line)}
.nav{display:flex;align-items:center;justify-content:space-between;height:68px}
.logo{font-family:var(--display);font-size:1.25rem;font-weight:700;text-decoration:none;letter-spacing:.01em}
.logo span{color:var(--brass)}
.nav-links{display:flex;gap:28px;list-style:none;align-items:center}
.nav-links a{text-decoration:none;font-size:.92rem;font-weight:500;color:var(--ink)}
.nav-links a:hover{color:var(--brass)}
.lang-toggle{display:flex;border:1px solid var(--line);border-radius:99px;overflow:hidden;margin-left:8px}
.lang-toggle button{border:0;background:transparent;padding:6px 14px;font-family:var(--body);font-size:.8rem;font-weight:700;letter-spacing:.06em;cursor:pointer;color:var(--muted)}
.lang-toggle button.active{background:var(--nogal);color:var(--paper)}
.burger{display:none;border:0;background:none;cursor:pointer;padding:8px}
.burger span{display:block;width:22px;height:2px;background:var(--ink);margin:5px 0;transition:transform .2s}

/* ---------- hero ---------- */
.hero{background:var(--nogal);color:var(--paper);position:relative;overflow:hidden}
.hero .grain{position:absolute;inset:0;opacity:.14;pointer-events:none}
.hero-inner{position:relative;padding:110px 0 96px;max-width:820px}
.hero .years{display:flex;align-items:center;gap:16px;font-family:var(--display);font-size:1rem;color:var(--brass-light);letter-spacing:.08em}
.hero .years .rule{flex:0 0 64px;height:1px;background:var(--brass)}
.hero h1{font-size:clamp(2.2rem,5.6vw,4rem);margin:.35em 0 .45em}
.hero h1 em{font-style:italic;color:var(--brass-light)}
.hero p{font-size:1.12rem;color:#d9d2c4;max-width:560px}
.hero-cta{margin-top:36px;display:flex;gap:14px;flex-wrap:wrap}
.btn{display:inline-block;text-decoration:none;font-weight:700;font-size:.95rem;padding:14px 28px;border-radius:99px;transition:transform .15s ease,background .15s ease}
.btn:hover{transform:translateY(-2px)}
.btn-brass{background:var(--brass);color:#fff}
.btn-brass:hover{background:var(--brass-light)}
.btn-ghost{border:1px solid rgba(244,241,233,.4);color:var(--paper)}
.btn-ghost:hover{border-color:var(--paper)}

/* ---------- services ---------- */
.services-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:22px}
.service{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:28px 26px}
.service .icon{width:42px;height:42px;color:var(--brass);margin-bottom:16px}
.service h3{font-size:1.15rem;margin-bottom:.5em}
.service p{font-size:.95rem;color:var(--muted)}

/* ---------- collection ---------- */
.collection{background:#ece8dd}
.cat-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:20px}
.cat{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);overflow:hidden;text-decoration:none;transition:transform .18s ease,box-shadow .18s ease}
.cat:hover{transform:translateY(-4px);box-shadow:0 12px 28px rgba(36,27,19,.12)}
.cat-img{aspect-ratio:4/3;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#e6dfd0,#d4cab4);position:relative}
.cat-img svg{width:52px;height:52px;color:var(--nogal-soft);opacity:.55}
.cat-img .pending{position:absolute;bottom:10px;right:12px;font-size:.66rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);background:rgba(251,249,244,.8);padding:3px 8px;border-radius:4px}
.cat h3{font-size:1rem;font-family:var(--body);font-weight:700;padding:16px 18px}

.cat-img img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
.cat-count{position:absolute;bottom:10px;right:12px;font-size:.68rem;font-weight:700;letter-spacing:.08em;color:#fff;background:rgba(36,27,19,.65);padding:3px 9px;border-radius:4px}

/* ---------- lightbox ---------- */
.lightbox{position:fixed;inset:0;background:rgba(20,15,10,.94);display:none;flex-direction:column;align-items:center;justify-content:center;z-index:100;padding:20px}
.lightbox.open{display:flex}
.lightbox img{max-width:92vw;max-height:74vh;border-radius:8px;box-shadow:0 20px 60px rgba(0,0,0,.5)}
.lb-bar{color:#d9d2c4;display:flex;gap:20px;align-items:center;margin-top:18px;font-size:.95rem}
.lb-btn{background:none;border:1px solid rgba(244,241,233,.35);color:#f4f1e9;border-radius:99px;width:44px;height:44px;font-size:1.15rem;cursor:pointer;line-height:1}
.lb-btn:hover{border-color:var(--brass-light);color:var(--brass-light)}
.lb-close{position:absolute;top:16px;right:20px;background:none;border:0;color:#f4f1e9;font-size:2rem;cursor:pointer;line-height:1;padding:8px}
.lb-title{font-family:var(--display);font-size:1.05rem}

/* ---------- heritage strip ---------- */
.heritage{background:var(--nogal);color:var(--paper)}
.heritage .container{display:grid;grid-template-columns:auto 1fr;gap:48px;align-items:center}
.heritage .num{font-family:var(--display);font-size:clamp(4rem,9vw,7rem);color:var(--brass-light);line-height:1}
.heritage p{max-width:560px;color:#d9d2c4;font-size:1.08rem}
.heritage .her-rebrand{font-family:var(--display);font-size:1.3rem;color:var(--brass-light);margin-bottom:12px}

/* ---------- contact ---------- */
.contact-grid{display:grid;grid-template-columns:1fr 1fr;gap:48px}
.contact-list{list-style:none;display:grid;gap:18px;margin-top:8px}
.contact-list li{display:flex;gap:14px;align-items:flex-start}
.contact-list svg{width:22px;height:22px;color:var(--brass);flex-shrink:0;margin-top:3px}
.contact-list a{color:var(--ink)}
.form{display:grid;gap:14px}
.form label{font-size:.82rem;font-weight:700;letter-spacing:.04em;text-transform:uppercase;color:var(--muted)}
.form input,.form textarea{width:100%;border:1px solid var(--line);background:var(--card);border-radius:8px;padding:12px 14px;font-family:var(--body);font-size:1rem;color:var(--ink)}
.form input:focus,.form textarea:focus{outline:2px solid var(--brass);outline-offset:1px;border-color:var(--brass)}
.form textarea{min-height:120px;resize:vertical}
.form .btn{border:0;cursor:pointer;justify-self:start}

/* ---------- footer ---------- */
footer{background:var(--nogal);color:#b8b0a0;padding:36px 0;font-size:.9rem}
footer .container{display:flex;justify-content:space-between;gap:20px;flex-wrap:wrap;align-items:center}
footer .social{display:flex;gap:18px}
footer .social a{color:#d9d2c4;text-decoration:none}
footer .social a:hover{color:var(--brass-light)}

/* ---------- responsive ---------- */
@media (max-width:820px){
  .section{padding:64px 0}
  .nav-links{position:fixed;inset:68px 0 auto 0;background:var(--paper);flex-direction:column;padding:24px;gap:20px;border-bottom:1px solid var(--line);display:none}
  .nav-links.open{display:flex}
  .burger{display:block}
  .contact-grid{grid-template-columns:1fr}
  .heritage .container{grid-template-columns:1fr;gap:16px}
}
@media (prefers-reduced-motion:reduce){
  *{transition:none!important;animation:none!important}
  html{scroll-behavior:auto}
}
</style>

/* furniture line icons, cycled across category cards */
const catIcons = [
  '<path d="M3 11V7a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2v4M3 11a2 2 0 0 0-2 2v5h2m0-7h18m2 2a2 2 0 0 0-2-2m2 2v5h-2m-18 0v2m18-2v2m-18-2h18" fill="none" stroke="currentColor" stroke-width="1.5"/>',   /* bed/sofa */
  '<path d="M4 3h16v7H4zM6 10v11M18 10v11M6 15h12" fill="none" stroke="currentColor" stroke-width="1.5"/>',  /* wardrobe */
  '<path d="M3 9h18M5 9V5h14v4M7 9v12M17 9v12M7 14h10" fill="none" stroke="currentColor" stroke-width="1.5"/>', /* table */
  '<path d="M6 19V5a2 2 0 0 1 2-2h8a2 2 0 0 1 2 2v14M4 19h16M9 7h6M9 11h6M9 15h6" fill="none" stroke="currentColor" stroke-width="1.5"/>' /* cabinet */
];

/* One folder per category under fotos/ — same order as i18n cats arrays.
   Drop images into the folder; fotos.json is regenerated automatically
   by the GitHub Action (.github/workflows/fotos.yml) on every push. */
const catSlugs = [
  'dormitorio-moderno','dormitorio-clasico','dormitorio-juvenil',
  'comedor-moderno','comedor-clasico','mesas-sillas','sofas',
  'mueble-auxiliar','macizo-forja','recibidor-moderno','recibidor-clasico',
  'vestidores','cuadros','estudio-despacho','colchones','somieres'
];

let lang = 'es';
let manifest = {};   /* { slug: ["01-foo.webp", ...], ... } from fotos.json */

fetch('fotos.json')
  .then(r => r.ok ? r.json() : {})
  .then(m => { manifest = m || {}; renderCats(); })
  .catch(() => renderCats()); /* opening the file locally (file://) falls back to placeholders */

function renderCats(){
  const grid = document.getElementById('catGrid');
  grid.innerHTML = '';
  i18n[lang].cats.forEach((name, i) => {
    const slug = catSlugs[i];
    const photos = manifest[slug] || [];
    const card = document.createElement('a');
    card.className = 'cat';
    let imgHtml;
    if (photos.length) {
      card.href = '#';
      card.addEventListener('click', ev => { ev.preventDefault(); openLb(i); });
      imgHtml =
        '<img src="fotos/' + slug + '/' + encodeURIComponent(photos[0]) + '" alt="' + name + '" loading="lazy">' +
        '<span class="cat-count">' + photos.length + ' &#128247;</span>';
    } else {
      card.href = '#contacto';
      imgHtml =
        '<svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">' + catIcons[i % catIcons.length] + '</svg>' +
        '<span class="pending">' + i18n[lang].pending + '</span>';
    }
    card.innerHTML = '<div class="cat-img">' + imgHtml + '</div><h3>' + name + '</h3>';
    grid.appendChild(card);
  });
}

/* ---------- lightbox ---------- */
let lbCat = 0, lbIdx = 0;
function openLb(catIndex){
  lbCat = catIndex; lbIdx = 0;
  updateLb();
  document.getElementById('lightbox').classList.add('open');
  document.body.style.overflow = 'hidden';
}
function closeLb(){
  document.getElementById('lightbox').classList.remove('open');
  document.body.style.overflow = '';
}
function stepLb(d){
  const photos = manifest[catSlugs[lbCat]] || [];
  if (!photos.length) return;
  lbIdx = (lbIdx + d + photos.length) % photos.length;
  updateLb();
}
function updateLb(){
  const slug = catSlugs[lbCat];
  const photos = manifest[slug] || [];
  const name = i18n[lang].cats[lbCat];
  document.getElementById('lbImg').src = 'fotos/' + slug + '/' + encodeURIComponent(photos[lbIdx]);
  document.getElementById('lbImg').alt = name;
  document.getElementById('lbTitle').textContent = name;
  document.getElementById('lbCount').textContent = (lbIdx + 1) + ' / ' + photos.length;
}
document.addEventListener('keydown', e => {
  if (!document.getElementById('lightbox').classList.contains('open')) return;
  if (e.key === 'Escape') closeLb();
  if (e.key === 'ArrowLeft') stepLb(-1);
  if (e.key === 'ArrowRight') stepLb(1);
});
document.getElementById('lightbox').addEventListener('click', e => {
  if (e.target.id === 'lightbox') closeLb();
});

function setLang(l){
  lang = l;
  document.documentElement.lang = l;
  document.getElementById('btnEs').classList.toggle('active', l==='es');
  document.getElementById('btnCa').classList.toggle('active', l==='ca');
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const k = el.getAttribute('data-i18n');
    if (i18n[l][k] !== undefined) el.textContent = i18n[l][k];
  });
  document.querySelectorAll('[data-i18n-html]').forEach(el => {
    const k = el.getAttribute('data-i18n-html');
    if (i18n[l][k] !== undefined) el.innerHTML = i18n[l][k];
  });
  renderCats();
}

function toggleMenu(){
  document.getElementById('navLinks').classList.toggle('open');
}
document.querySelectorAll('.nav-links a').forEach(a =>
  a.addEventListener('click', () => document.getElementById('navLinks').classList.remove('open'))
);

document.getElementById('year').textContent = new Date().getFullYear();
setLang('es');
</script>
